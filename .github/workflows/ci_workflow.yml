name: Frontend CI workflow
on:
  workflow_dispatch:
  # push:
  #   branches: [ "main" ]

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: self-hosted
    env:
      ECR_REPOSITORY: ${{ github.event.repository.name }}
      IMAGE_TAG: ${{ github.run_number }}

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ASSUME_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Export ECR registry to env
        run: echo "ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

      - name: Run Snyk container scan
        continue-on-error: true
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: snyk_uat.1fcad39e.eyJlIjoxNzkyMjYyNDI5LCJoIjoic255ay5pbyIsImoiOiJBWjk3cmlzU29BbGFkcWVUNV9QQkRRIiwicyI6IjFmcVdQRFBqUjJLWllON0FhQ2RCdVEiLCJ0aWQiOiJBQUFBQUFBQUFBQUFBQUFBQUFBQUFBIn0.bj8O07NemS9KAUuK44w666EWL2n2Pe85VatoqOVJPZ5kl0ZJxphdAKhuSkd1IRMuPm84Jm_PDX0iyglYOSFHCA
        with:
          command: monitor
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          args: --file=Dockerfile --severity-threshold=high

      - name: Push Docker image to ECR
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          
      - name: Docker Cleanup
        if: always()
        run: |
          # Remove dangling images and (untagged layers from builds)
          docker image prune -f          
