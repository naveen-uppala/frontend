# ==========================================
# PROJECT IDENTITY
# ==========================================
sonar.projectKey=naveen-uppala_frontend
sonar.organization=naveen-uppala
sonar.projectName=frontend
sonar.projectVersion=1.0.0

# ==========================================
# SOURCE CONFIGURATION
# React source → src/
# Express source → server/
# ==========================================
sonar.sources=src,server
sonar.tests=src
sonar.sourceEncoding=UTF-8

# ==========================================
# TEST FILE PATTERNS
# ==========================================
sonar.test.inclusions=\
  **/*.test.js, \
  **/*.test.jsx, \
  **/*.spec.js, \
  **/*.spec.jsx

# ==========================================
# COVERAGE REPORTS (React - Jest/lcov)
# ==========================================
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ==========================================
# EXCLUSIONS
# ==========================================
sonar.exclusions=\
  **/node_modules/**, \
  **/build/**, \
  **/coverage/**, \
  **/public/**, \
  **/cdk/**, \
  **/*.min.js, \
  **/dist/**, \
  server/build/**

sonar.coverage.exclusions=\
  **/reportWebVitals.js, \
  **/setupTests.js, \
  **/index.js, \
  **/*.config.js, \
  **/App.js, \
  server/**

sonar.test.exclusions=\
  **/node_modules/**, \
  **/build/**, \
  server/build/**
