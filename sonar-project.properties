sonar.projectKey=your_org_my-app
sonar.organization=your_sonarcloud_org
sonar.projectName=my-app (React)
sonar.projectVersion=0.1.0

sonar.sources=src
sonar.tests=src
sonar.sourceEncoding=UTF-8

sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.exclusions=\
  **/node_modules/**, \
  **/build/**, \
  **/coverage/**, \
  **/public/**, \
  **/reportWebVitals.js, \
  **/setupTests.js, \
  **/index.js

sonar.coverage.exclusions=\
  **/reportWebVitals.js, \
  **/setupTests.js, \
  **/index.js, \
  **/*.config.js, \
  **/App.js
